<div class="dashboard-container">
  <h1>Welcome to EWTS</h1>

  <p>Signed in as: <strong>{{ userRole() }}</strong></p>

  @if (isManagerOrAdmin) {
    <p class="hint">
      As a {{ userRole() }}, you can review and approve completed tasks from the
      <strong>Approvals</strong> tab above.
    </p>
  } @else {
    <p class="hint">
      Check the <strong>My Tasks</strong> tab above to view and update tasks assigned to you.
    </p>
  }
</div>
