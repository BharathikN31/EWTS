@if (isLoggedIn) {
  <nav class="navbar">
    <a routerLink="/dashboard" class="brand">EWTS</a>

    <div class="nav-links">
      <a routerLink="/dashboard">Dashboard</a>
      <a routerLink="/tasks">My Tasks</a>

      @if (isManagerOrAdmin) {
        <a routerLink="/workflow">Approvals</a>
      }

      @if (userRole() === 'Admin') {
        <a routerLink="/admin/create-user">Create User</a>
      }

      <a routerLink="/profile">Profile</a>

      <button (click)="logout()">Logout</button>
    </div>
  </nav>
}
